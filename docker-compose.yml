services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/${MONGO_DB:-resume_ai_app}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-60}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-}
      EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: ${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-1440}
      EMAIL_VERIFICATION_URL: ${EMAIL_VERIFICATION_URL:-}
    ports:
      - "${API_PORT:-5000}:5000"
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-resume_ai_app}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" localhost:27017/test | grep 1 >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
